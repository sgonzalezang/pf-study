<style>
 :root{color-scheme:light dark}
 html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
 body{display:flex;align-items:center;justify-content:center;background:#f4f1ea;color:#1c1a17}
 @media(prefers-color-scheme:dark){body{background:#161412;color:#ece7df}}
 .box{width:min(92vw,380px);background:#fffdf8;border:1px solid #e2dcd0;border-radius:16px;

 @media(prefers-color-scheme:dark){.box{background:#201d1a;border-color:#332f29}}
 h1{font-family:'Iowan Old Style',Palatino,Georgia,serif;font-size:22px;margin:0 0 4px}
 p{color:#6b655c;font-size:14px;margin:0 0 18px}@media(prefers-color-scheme:dark){p{color:#a49c8f}}
 input{width:100%;box-sizing:border-box;font-size:17px;padding:13px 15px;border:1px solid #e2dcd0;
   border-radius:11px;background:#f4f1ea;color:inherit;text-align:center;letter-spacing:1px;margin-bottom:12px}
 @media(prefers-color-scheme:dark){input{background:#161412;border-color:#332f29}}
 button{width:100%;font-size:16px;font-weight:600;padding:13px;border:none;border-radius:11px;
   background:#7a1f2b;color:#fff;cursor:pointer}
 .err{color:#a12020;font-size:13px;min-height:18px;margin-top:10px}
 label{display:flex;gap:7px;align-items:center;justify-content:center;font-size:13px;color:#6b655c;margin-bottom:14px}
 .lock{font-size:30px}
</style></head>

function b2u(b){const s=atob(b),a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function unlock(pass){
  const data=b2u(BLOB), salt=data.slice(0,16), iv=data.slice(16,28), ct=data.slice(28);
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:ITER,hash:'SHA-256'},km,
    {name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  return new TextDecoder().decode(pt);
}
async function attempt(pass,remember){
  const err=document.getElementById('err');err.textContent='Unlocking…';
  try{
    const html=await unlock(pass);
    if(remember)localStorage.setItem('pf_pin',pass);
    document.open();document.write(html);document.close();
  }catch(e){err.textContent='Wrong PIN. Try again.';localStorage.removeItem('pf_pin');
    const i=document.getElementById('pin');if(i){i.value='';i.focus();}}
}
document.getElementById('go').onclick=()=>attempt(document.getElementById('pin').value,document.getElementById('rem').checked);
document.getElementById('pin').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('go').click();});
window.addEventListener('load',()=>{const s=localStorage.getItem('pf_pin');if(s)attempt(s,true);else document.getElementById('pin').focus();});
